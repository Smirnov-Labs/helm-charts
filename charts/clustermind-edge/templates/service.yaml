apiVersion: v1
kind: Service
metadata:
  name: {{ include "clustermind-edge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clustermind-edge.labels" . | nindent 4 }}
    component: service
spec:
  type: ClusterIP
  selector:
    {{- include "clustermind-edge.agentSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
    {{- if .Values.redis.enabled }}
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
    {{- end }}
