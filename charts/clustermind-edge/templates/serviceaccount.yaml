{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clustermind-edge.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clustermind-edge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- if .Values.superAgent.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clustermind-edge.superAgentServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clustermind-edge.superAgentLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
