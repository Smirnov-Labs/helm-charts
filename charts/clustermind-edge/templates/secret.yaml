{{- if include "clustermind-edge.createSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clustermind-edge.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clustermind-edge.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.anthropic.apiKey (not .Values.anthropic.existingSecret) }}
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | quote }}
  {{- end }}
  {{- if and .Values.slack.botToken (not .Values.slack.existingSecret) }}
  SLACK_BOT_TOKEN: {{ .Values.slack.botToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.slack.signingSecret | quote }}
  SLACK_TEAM_ID: {{ .Values.slack.teamId | quote }}
  SLACK_ALERT_CHANNEL: {{ .Values.slack.alertChannel | quote }}
  {{- end }}
  {{- if and .Values.controlPlane.clusterApiKey (not .Values.controlPlane.existingSecret) }}
  CLUSTER_API_KEY: {{ .Values.controlPlane.clusterApiKey | quote }}
  {{- end }}
{{- end }}
