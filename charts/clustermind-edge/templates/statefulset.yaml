apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clustermind-edge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clustermind-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  annotations:
    {{- include "clustermind-edge.annotations" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "clustermind-edge.fullname" . }}
  selector:
    matchLabels:
      {{- include "clustermind-edge.agentSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clustermind-edge.labels" . | nindent 8 }}
        app.kubernetes.io/component: agent
      annotations:
        {{- include "clustermind-edge.annotations" . | nindent 8 }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "clustermind-edge.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "clustermind-edge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clustermind-edge.fullname" . }}-config
          env:
            - name: MODE
              value: "regular"
            - name: REDIS_URL
              value: "redis://localhost:6379/0"
            {{- if or .Values.anthropic.apiKey .Values.anthropic.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.anthropicSecretName" . }}
                  key: {{ .Values.anthropic.existingSecretKey | default "ANTHROPIC_API_KEY" }}
            {{- end }}
            {{- if or .Values.slack.botToken .Values.slack.existingSecret }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.slackSecretName" . }}
                  key: SLACK_BOT_TOKEN
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.slackSecretName" . }}
                  key: SLACK_SIGNING_SECRET
            - name: SLACK_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.slackSecretName" . }}
                  key: SLACK_TEAM_ID
            - name: SLACK_ALERT_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.slackSecretName" . }}
                  key: SLACK_ALERT_CHANNEL
            {{- end }}
            {{- if or .Values.controlPlane.clusterApiKey .Values.controlPlane.existingSecret }}
            - name: CLUSTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clustermind-edge.controlPlaneSecretName" . }}
                  key: CLUSTER_API_KEY
                  optional: true
            {{- end }}
          {{- with .Values.agent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: diagnostics-config
              mountPath: /app/diagnostics
              readOnly: true
            - name: repo-storage
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        {{- if .Values.redis.enabled }}
        - name: redis
          image: {{ .Values.redis.image }}
          command:
            - redis-server
            - --appendonly
            - "no"
            - --save
            - "300 100"
            - --save
            - "60 1000"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        {{- end }}
      volumes:
        - name: diagnostics-config
          configMap:
            name: {{ include "clustermind-edge.fullname" . }}-diagnostics
            optional: true
        - name: repo-storage
          emptyDir:
            sizeLimit: 2Gi
  {{- if and .Values.redis.enabled .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
